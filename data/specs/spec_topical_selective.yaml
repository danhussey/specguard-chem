id: spec_topical_selective
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: dermal_retention, type: hard, check: property_bounds_all, params: {bounds: {MW: [250,600], HBD: [1,5], HBA: [2,10], logP: [1,5], TPSA: [60,150]}}, severity: medium }
  - { id: systemic_avoid, type: soft, check: property_bounds_any, params: {MW: [400,600], TPSA: [80,150]}, weight: 1.8 }
  - { id: skin_penetration, type: soft, check: property_bounds_all, params: {bounds: {logP: [2,4]}}, weight: 1.3 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.3
      TPSA: 15.0