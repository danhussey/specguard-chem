id: spec_geriatric_depression
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: tricyclic_avoid, type: hard, check: substructure_absent, params: {alert_set: "TRICYCLIC_STRUCTURES"}, severity: critical }
  - { id: cognitive_preserve, type: hard, check: property_bounds_all, params: {bounds: {MW: [200,400], HBD: [0,3], HBA: [1,6], logP: [0,3], TPSA: [30,100]}}, severity: medium }
  - { id: anticholinergic_minimal, type: soft, check: property_bounds_any, params: {TPSA: [40,90], logP: [0,2.5]}, weight: 2.0 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.2
      TPSA: 8.0