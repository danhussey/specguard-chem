id: spec_combination_rational
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: combination_compatible, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,450], HBD: [0,5], HBA: [0,9], logP: [-1,4], TPSA: [30,130]}}, severity: medium }
  - { id: synergy_potential, type: soft, check: property_bounds_any, params: {TPSA: [40,110], logP: [0,3.5]}, weight: 1.5 }
  - { id: individual_contribution, type: soft, check: property_bounds_all, params: {bounds: {MW: [200,400]}}, weight: 1.3 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.3
      TPSA: 10.0