id: spec_generic_viable
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: patent_clear, type: hard, check: substructure_absent, params: {alert_set: "PATENTED_STRUCTURES"}, severity: critical }
  - { id: bioequivalence_friendly, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,500], HBD: [0,5], HBA: [0,10], logP: [-1,5], TPSA: [20,140]}}, severity: medium }
  - { id: formulation_stable, type: soft, check: property_bounds_any, params: {TPSA: [30,110], logP: [0,4]}, weight: 1.3 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.3
      TPSA: 10.0