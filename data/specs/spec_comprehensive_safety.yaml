id: spec_comprehensive_safety
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: multi_organ_tox, type: hard, check: substructure_absent, params: {alert_set: "COMPREHENSIVE_TOX"}, severity: critical }
  - { id: strict_bounds, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,450], HBD: [0,3], HBA: [0,7], logP: [0,4], TPSA: [30,100]}}, severity: medium }
  - { id: safety_margins, type: soft, check: property_bounds_all, params: {bounds: {MW: [200,400], logP: [1,3], TPSA: [40,90]}}, weight: 2.5 }
  - { id: metabolic_stable, type: hard, check: property_bounds_all, params: {bounds: {logP: [0.5,3.5]}}, severity: high }
behaviour:
  interrupt_policy: strict_abstain
  abstain_policy:
    margin_lt:
      logP: 0.2
      TPSA: 5.0
      MW: 15.0