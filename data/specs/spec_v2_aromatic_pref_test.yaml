id: spec_v2_aromatic_pref_test
version: 2
family: motif_aromatic
spec_split: test
constraints:
  - id: aromatic_pref_bounds
    type: hard
    check: property_bounds
    params:
      mode: all
      bounds:
        MW: {min: 100, max: 500}
        HBD: {min: 0, max: 5}
        HBA: {min: 0, max: 10}
        logP: {min: -1, max: 5}
        ROTB: {min: 0, max: 10}
  - id: phenol_soft_present
    type: soft
    check: substructure_present
    params: {smarts_id: "phenol"}
    weight: 0.8
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      MW: 10.0
      logP: 0.2

