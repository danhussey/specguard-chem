id: spec_glucose_dependent
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: hypoglycemia_avoid, type: hard, check: substructure_absent, params: {alert_set: "HYPOGLYCEMIC_RISK"}, severity: critical }
  - { id: glucose_sensing, type: hard, check: property_bounds_all, params: {bounds: {MW: [200,500], HBD: [1,5], HBA: [2,10], logP: [-1,3.5], TPSA: [60,140]}}, severity: medium }
  - { id: incretin_like, type: soft, check: property_bounds_any, params: {TPSA: [80,130], MW: [300,450]}, weight: 1.6 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.2
      TPSA: 12.0