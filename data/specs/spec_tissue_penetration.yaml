id: spec_tissue_penetration
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: penetration_enhanced, type: hard, check: property_bounds_all, params: {bounds: {MW: [200,500], HBD: [0,4], HBA: [1,8], logP: [1,4], TPSA: [30,110]}}, severity: medium }
  - { id: antimicrobial_props, type: soft, check: property_bounds_any, params: {logP: [1.5,3.5], TPSA: [40,100]}, weight: 1.4 }
  - { id: distribution_volume, type: soft, check: property_bounds_all, params: {bounds: {MW: [250,450], logP: [2,4]}}, weight: 1.6 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.3
      TPSA: 10.0