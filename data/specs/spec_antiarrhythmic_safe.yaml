id: spec_antiarrhythmic_safe
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: proarrhythmic_avoid, type: hard, check: substructure_absent, params: {alert_set: "PROARRHYTHMIC_ALERTS"}, severity: critical }
  - { id: cardiac_selective, type: hard, check: property_bounds_all, params: {bounds: {MW: [200,450], HBD: [0,4], HBA: [1,8], logP: [0,4], TPSA: [30,110]}}, severity: medium }
  - { id: ion_channel_selective, type: soft, check: property_bounds_any, params: {logP: [1,3.5], MW: [250,400]}, weight: 1.7 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.3
      MW: 25.0