id: spec_pulmonary_safety
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: pneumotox_avoid, type: hard, check: substructure_absent, params: {alert_set: "PNEUMOTOX_ALERTS"}, severity: critical }
  - { id: lung_safe_bounds, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,450], HBD: [0,4], HBA: [0,7], logP: [-1,4], TPSA: [30,130]}}, severity: medium }
  - { id: inflammatory_low, type: soft, check: property_bounds_any, params: {TPSA: [50,120], logP: [0,3]}, weight: 1.6 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.3
      TPSA: 12.0