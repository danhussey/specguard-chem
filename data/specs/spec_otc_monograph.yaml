id: spec_otc_monograph
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: otc_approved, type: hard, check: substructure_absent, params: {alert_set: "RX_ONLY_STRUCTURES"}, severity: critical }
  - { id: monograph_bounds, type: hard, check: property_bounds_all, params: {bounds: {MW: [100,400], HBD: [0,4], HBA: [0,6], logP: [-1,4], TPSA: [20,100]}}, severity: medium }
  - { id: self_medication_safe, type: soft, check: property_bounds_any, params: {TPSA: [30,80], logP: [0,3]}, weight: 1.5 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.3
      TPSA: 8.0