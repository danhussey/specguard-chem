id: spec_drug_interactions
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: ddi_risk_block, type: hard, check: substructure_absent, params: {alert_set: "DDI_ALERTS"}, severity: high }
  - { id: interaction_safe, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,500], HBD: [0,4], HBA: [0,9], logP: [-1,4], TPSA: [30,120]}}, severity: medium }
  - { id: cyp_neutral, type: soft, check: property_bounds_any, params: {MW: [200,400], logP: [1,3.5]}, weight: 1.5 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.4
      MW: 20.0