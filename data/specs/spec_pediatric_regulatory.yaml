id: spec_pediatric_regulatory
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: pediatric_exclusions, type: hard, check: substructure_absent, params: {alert_set: "PEDIATRIC_CONTRAINDICATED"}, severity: critical }
  - { id: fda_pediatric, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,400], HBD: [0,4], HBA: [1,8], logP: [-1,3], TPSA: [30,120]}}, severity: medium }
  - { id: developmental_safety, type: soft, check: property_bounds_any, params: {MW: [200,350], TPSA: [40,100]}, weight: 2.0 }
behaviour:
  interrupt_policy: strict_abstain
  abstain_policy:
    margin_lt:
      logP: 0.15
      TPSA: 8.0