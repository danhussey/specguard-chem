id: spec_cyp2d6_mild
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: cyp2d6_weak, type: hard, check: substructure_absent, params: {alert_set: "CYP2D6_STRONG_INHIBITORS"}, severity: high }
  - { id: cns_compatible, type: hard, check: property_bounds_all, params: {bounds: {MW: [200,450], HBD: [0,2], HBA: [0,6], logP: [1,4], TPSA: [20,80]}}, severity: medium }
  - { id: antidepressant_like, type: soft, check: property_bounds_any, params: {logP: [2,4], MW: [250,350]}, weight: 1.3 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.2
      MW: 25.0