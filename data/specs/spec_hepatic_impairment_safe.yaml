id: spec_hepatic_impairment_safe
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: hepatic_independent, type: hard, check: substructure_absent, params: {alert_set: "HEPATIC_DEPENDENT"}, severity: critical }
  - { id: liver_bypass, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,400], HBD: [1,5], HBA: [2,9], logP: [-1,2.5], TPSA: [50,130]}}, severity: medium }
  - { id: renal_clearance, type: soft, check: property_bounds_any, params: {TPSA: [70,120], logP: [-1,1.5]}, weight: 2.0 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.15
      TPSA: 10.0