id: spec_cyp2c9_safe
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: cyp2c9_avoid, type: hard, check: substructure_absent, params: {alert_set: "CYP2C9_SUBSTRATES"}, severity: critical }
  - { id: warfarin_safe, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,400], HBD: [0,3], HBA: [0,6], logP: [0,3.5]}}, severity: medium }
  - { id: analgesic_props, type: soft, check: property_bounds_any, params: {TPSA: [30,80], logP: [1,3]}, weight: 1.2 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.3
      TPSA: 8.0