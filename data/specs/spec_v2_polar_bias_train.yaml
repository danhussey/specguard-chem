id: spec_v2_polar_bias_train
version: 2
family: polar_bias
spec_split: train
constraints:
  - id: polar_bounds
    type: hard
    check: property_bounds
    params:
      mode: all
      bounds:
        MW: {min: 120, max: 520}
        HBD: {min: 0, max: 6}
        HBA: {min: 1, max: 12}
        logP: {min: -1, max: 3}
        TPSA: {min: 40, max: 180}
        ROTB: {min: 0, max: 10}
  - id: amide_soft_preference
    type: soft
    check: substructure_present
    params: {smarts_id: "amide"}
    weight: 0.8
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      TPSA: 5.0
      MW: 10.0

