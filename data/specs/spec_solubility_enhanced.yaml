id: spec_solubility_enhanced
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: solubility_friendly, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,450], HBD: [1,5], HBA: [2,10], logP: [-1,3], TPSA: [40,130]}}, severity: medium }
  - { id: bcs_improved, type: soft, check: property_bounds_any, params: {TPSA: [60,120], HBD: [2,4]}, weight: 2.0 }
  - { id: salt_formation, type: soft, check: property_bounds_all, params: {bounds: {HBA: [3,8]}}, weight: 1.2 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.2
      TPSA: 10.0