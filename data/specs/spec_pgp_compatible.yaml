id: spec_pgp_compatible
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: pgp_friendly, type: hard, check: substructure_absent, params: {alert_set: "PGP_INHIBITORS"}, severity: high }
  - { id: transporter_safe, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,450], HBD: [0,4], HBA: [0,8], logP: [-1,3.5], TPSA: [30,120]}}, severity: medium }
  - { id: distribution_friendly, type: soft, check: property_bounds_any, params: {MW: [200,400], TPSA: [40,100]}, weight: 1.3 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.3
      MW: 20.0