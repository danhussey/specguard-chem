id: spec_controlled_avoidance
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: controlled_avoid, type: hard, check: substructure_absent, params: {alert_set: "CONTROLLED_SUBSTANCES"}, severity: critical }
  - { id: dea_scheduling_avoid, type: hard, check: substructure_absent, params: {alert_set: "PSYCHOACTIVE_ALERTS"}, severity: critical }
  - { id: cns_penetration, type: hard, check: property_bounds_all, params: {bounds: {MW: [200,450], HBD: [0,3], HBA: [1,7], logP: [1,4], TPSA: [30,90]}}, severity: medium }
  - { id: antibiotic_selective, type: soft, check: property_bounds_any, params: {TPSA: [60,120], logP: [1,3.5]}, weight: 1.4 }
behaviour:
  interrupt_policy: strict_abstain
  abstain_policy:
    margin_lt:
      logP: 0.2
      TPSA: 8.0