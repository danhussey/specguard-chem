id: spec_rapid_clearance
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: fast_onset, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,350], HBD: [0,3], HBA: [1,6], logP: [1,3.5], TPSA: [30,90]}}, severity: medium }
  - { id: metabolic_sites, type: soft, check: property_bounds_any, params: {HBD: [1,3], logP: [1.5,3]}, weight: 1.5 }
  - { id: accumulation_avoid, type: hard, check: property_bounds_all, params: {bounds: {MW: [0,300], logP: [0,3]}}, severity: high }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.2
      MW: 15.0