id: spec_pediatric_suitable
version: 1
constraints:
  - { id: pains_block, type: hard, check: substructure_absent, params: {alert_set: "PAINS_A"}, severity: high }
  - { id: pediatric_safe, type: hard, check: substructure_absent, params: {alert_set: "PEDIATRIC_AVOID"}, severity: critical }
  - { id: child_appropriate, type: hard, check: property_bounds_all, params: {bounds: {MW: [150,400], HBD: [0,4], HBA: [1,8], logP: [-1,3], TPSA: [30,120]}}, severity: medium }
  - { id: developmental_safe, type: soft, check: property_bounds_any, params: {MW: [200,350], TPSA: [40,100]}, weight: 2.0 }
  - { id: palatability, type: soft, check: property_bounds_all, params: {bounds: {logP: [0,2.5]}}, weight: 1.4 }
behaviour:
  interrupt_policy: confirm_then_continue
  abstain_policy:
    margin_lt:
      logP: 0.2
      TPSA: 10.0